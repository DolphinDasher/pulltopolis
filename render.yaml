services:
  - type: web
    name: pulltopolis
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "1"
      - key: DATABASE_PATH
        value: data/pulltopolis.sqlite
      - key: GITHUB_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
